<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Niki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <div class="logo">Niki.</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="section-title">Let's Connect</h2>
        
        <p style="text-align: center; margin-bottom: 2rem;">I'm always open to discussing UX/UI design, data science projects, or even just chatting about the best local ski runs! Feel free to reach out.</p>

        <form action="#" method="POST">
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Hello! I'd love to collaborate on..." required></textarea>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; font-size: 1rem;">Send Message</button>
            
            <div style="text-align: center; margin-top: 2rem;">
                <p>Or find me on:</p>
                <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 1rem;">
                    <a href="#" class="tag" style="text-decoration: none;">LinkedIn</a>
                    <a href="#" class="tag" style="text-decoration: none;">GitHub</a>
                    <a href="#" class="tag" style="text-decoration: none;">Figma</a>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Niki. Designed with care.</p>
    </footer>

</body>
</html>
